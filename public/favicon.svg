<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Outer pulsing ring -->
  <circle cx="25" cy="25" r="22" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.3">
    <animate attributeName="r" values="22;24;22" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Main pulsing circle -->
  <circle cx="25" cy="25" r="18" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.85">
    <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.4;0.85" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner filled dot -->
  <circle cx="25" cy="25" r="5" fill="#a78bfa" opacity="0.9">
    <animate attributeName="r" values="5;6;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
